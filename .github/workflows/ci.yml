name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Postgres for logical replication
        run: |
          psql "postgres://test:test@localhost:5432/test" \
            -c "ALTER SYSTEM SET wal_level = logical;" || true
        env:
          PGPASSWORD: test

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Integration tests
        run: go test -tags=integration -race -count=1 ./...
        env:
          TEST_DB_URL: postgres://test:test@localhost:5432/test?sslmode=disable
        continue-on-error: true
